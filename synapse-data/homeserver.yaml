# Configuration file for Synapse.
#
# This is a YAML file: see [1] for a quick introduction. Note in particular
# that *indentation is important*: all the elements of a list or dictionary
# should have the same indentation.
#
# [1] https://docs.ansible.com/ansible/latest/reference_appendices/YAMLSyntax.html
#
# For more information on how to configure Synapse, including a complete accounting of
# each option, go to docs/usage/configuration/config_documentation.md or
# https://element-hq.github.io/synapse/latest/usage/configuration/config_documentation.html
server_name: "lamma"
public_baseurl: "https://lamma.ijmeet.com/"
pid_file: /data/homeserver.pid
listeners:
  - port: 8008
    resources:
    - compress: false
      names:
      - client
      - federation
    tls: false
    type: http
    x_forwarded: true
database:
  name: psycopg2
  args:
    user: synapse
    password: synapse_password
    database: synapse
    host: db
    cp_min: 5
    cp_max: 10
log_config: "/data/lamma.log.config"
media_store_path: /data/media_store
registration_shared_secret: "TB*t.H,wc223.GJHJcdM.Voq#qyFhLrI~dHvV2,Rs_iqxBAO4_"
report_stats: false
macaroon_secret_key: "GQGRpF^lSQ5xEltI^xVF257H*l_V:3XNblLjGLRWr9*ENG_A8p"
form_secret: "nD@ra_X-u-eXg=Y1ky+rgu.f0G*HKT1l62RdrEEtj0#^0L8D61"
signing_key_path: "/data/lamma.signing.key"
trusted_key_servers:
  - server_name: "matrix.org"

# Allow registration (dev only — disable in production)
enable_registration: true
enable_registration_without_verification: true

# Relaxed rate limits for development
rc_login:
  address:
    per_second: 10
    burst_count: 50
  account:
    per_second: 10
    burst_count: 50

# Allow Synapse to reach Sygnal push gateway on local/Docker network
ip_range_whitelist:
  - '192.168.0.0/16'
  - '172.16.0.0/12'
  - '10.0.0.0/8'

# Lamma phone auth module
modules:
  - module: synapse.modules.lamma_phone_auth.LammaPhoneAuthModule
    config:
      internal_password: "_lamma_otp_internal_"
      # Set to true for production (real SMS via Omantel), false for dev (fixed code 123456)
      use_omantel_otp: true
      omantel_client_id: "rKSjSVACifmuGDEnewINGJZwsXAFE2hxHoAMUbpkYvkG4VRC"
      omantel_client_secret: "MZjofveT09b8mWfT7QRhLwzLhpcFgarpaErZYYuGt6jQh9NyRVHyElLXpTSh0IgH"
      omantel_scope: "one-time-password-sms:send-validate"
      omantel_base_url: "https://apigw.omantel.om"
      omantel_sender: "Lamma"
      omantel_message: "Your Lamma code is {{code}}"

# Enable MatrixRTC experimental features
experimental_features:
  msc3266_enabled: true
  msc4222_enabled: true
  msc4140_enabled: true
  msc4143_enabled: true
  msc4156_enabled: true

max_event_delay_duration: 24h

# MatrixRTC transport config (MSC4143)
matrix_rtc:
  transports:
    - type: "livekit"
      livekit_service_url: "https://lamma.ijmeet.com/sfu/get"

# LiveKit SFU discovery via well-known
extra_well_known_client_content:
  org.matrix.msc3814:
    auth: "https://lamma.ijmeet.com"
    url: "wss://lamma.ijmeet.com:7443"
  org.matrix.msc4143.rtc_foci:
    - type: "livekit"
      livekit_service_url: "https://lamma.ijmeet.com"
  org.matrix.msc4156.native_group_call_support: {}
  io.element.call:
    url: "https://lamma.ijmeet.com/call"

# vim:ft=yaml